<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서바이벌 슈터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
    }

    #gameWrapper {
      position: relative;
      width: 900px;
      height: 650px;
    }

    canvas {
      display: block;
      border-radius: 16px;
      border: 2px solid rgba(0, 200, 255, 0.3);
      box-shadow:
        0 0 40px rgba(0, 200, 255, 0.15),
        0 0 80px rgba(0, 100, 200, 0.1),
        inset 0 0 60px rgba(0, 0, 0, 0.5);
      cursor: none;
    }

    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 20px;
      pointer-events: none;
      z-index: 10;
    }

    .hud-box {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(0, 200, 255, 0.25);
      border-radius: 10px;
      padding: 8px 16px;
      backdrop-filter: blur(6px);
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0, 200, 255, 0.6);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .hud-value {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 12px rgba(0, 200, 255, 0.8);
      line-height: 1;
    }

    #healthBar {
      width: 160px;
    }

    #healthTrack {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-top: 6px;
      overflow: hidden;
    }

    #healthFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00ff88, #00e5ff);
      border-radius: 4px;
      transition: width 0.2s ease, background 0.3s ease;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
    }

    /* Overlay screens */
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(4px);
      z-index: 20;
      gap: 20px;
      transition: opacity 0.4s ease;
    }

    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, #00e5ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      line-height: 1.1;
      filter: drop-shadow(0 0 20px rgba(0, 200, 255, 0.4));
    }

    .overlay p {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .btn {
      padding: 14px 44px;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      background: linear-gradient(135deg, #00b4d8, #7b2fff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 20px rgba(0, 180, 216, 0.4);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn:hover { transform: scale(1.05); box-shadow: 0 0 36px rgba(0, 180, 216, 0.7); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.97); }

    #gameOverScore {
      font-size: 18px;
      color: #fff;
      text-align: center;
    }

    #gameOverScore span {
      color: #00e5ff;
      font-size: 28px;
      font-weight: 900;
      display: block;
      margin-top: 4px;
      text-shadow: 0 0 16px rgba(0, 229, 255, 0.8);
    }

    #wave-announce {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 200, 255, 0.9);
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="900" height="650"></canvas>

  <div id="hud">
    <div class="hud-box" id="healthBar">
      <div class="hud-label">HEALTH</div>
      <div id="healthTrack"><div id="healthFill"></div></div>
    </div>
    <div class="hud-box">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">WAVE</div>
      <div class="hud-value" id="waveDisplay">1</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">KILLS</div>
      <div class="hud-value" id="killDisplay">0</div>
    </div>
  </div>

  <!-- Wave announce -->
  <div id="wave-announce"></div>

  <!-- Start Screen -->
  <div class="overlay" id="startScreen">
    <h1>⚡ SURVIVAL<br>SHOOTER</h1>
    <p>
      마우스로 캐릭터를 이동 · 자동으로 가장 가까운 적을 공격<br>
      적이 당신에게 닿으면 HP가 감소합니다
    </p>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h1>💀 GAME<br>OVER</h1>
    <div id="gameOverScore">최종 점수 <span id="finalScore">0</span></div>
    <p id="finalStats"></p>
    <button class="btn" id="restartBtn">RESTART</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // HUD elements
  const scoreDisplay  = document.getElementById('scoreDisplay');
  const waveDisplay   = document.getElementById('waveDisplay');
  const killDisplay   = document.getElementById('killDisplay');
  const healthFill    = document.getElementById('healthFill');
  const startScreen   = document.getElementById('startScreen');
  const gameOverScreen= document.getElementById('gameOverScreen');
  const finalScore    = document.getElementById('finalScore');
  const finalStats    = document.getElementById('finalStats');
  const waveAnnounce  = document.getElementById('wave-announce');

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  // ────────────────────────────────────────────────────────
  // Game state
  // ────────────────────────────────────────────────────────
  let state = 'idle'; // idle | playing | dead
  let score, kills, wave, waveTimer, spawnInterval, spawnTimer;
  let player, enemies, bullets, particles, floatTexts;
  let mouse = { x: W / 2, y: H / 2 };
  let lastTime = 0;
  let rafId;

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  // ────────────────────────────────────────────────────────
  // Initialise / restart
  // ────────────────────────────────────────────────────────
  function startGame() {
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');

    score = 0; kills = 0; wave = 1;
    spawnInterval = 480; // ms between spawns
    spawnTimer    = 0;
    waveTimer     = 0;

    player = {
      x: W / 2, y: H / 2,
      r: 18,
      hp: 100, maxHp: 100,
      shotCooldown: 0,
      shotRate: 120,   // ms between shots
      invincible: 0,   // ms of invincibility after hit
      trail: [],
    };

    enemies   = [];
    bullets   = [];
    particles = [];
    floatTexts= [];

    state = 'playing';
    lastTime = performance.now();
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
    showWaveAnnounce(1);
  }

  // ────────────────────────────────────────────────────────
  // Wave announce
  // ────────────────────────────────────────────────────────
  function showWaveAnnounce(w) {
    waveAnnounce.textContent = `WAVE  ${w}`;
    waveAnnounce.style.transition = 'none';
    waveAnnounce.style.opacity = '1';
    setTimeout(() => {
      waveAnnounce.style.transition = 'opacity 1.2s ease';
      waveAnnounce.style.opacity = '0';
    }, 1200);
  }

  // ────────────────────────────────────────────────────────
  // Spawn enemy from outside the canvas
  // ────────────────────────────────────────────────────────
  function spawnEnemy() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const size = 14 + Math.random() * 10;
    const speed = (1.2 + wave * 0.18 + Math.random() * 0.8);

    if (side === 0) { x = Math.random() * W; y = -size; }
    else if (side === 1) { x = W + size; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = H + size; }
    else              { x = -size; y = Math.random() * H; }

    // colour based on wave
    const hue = (wave * 40 + Math.random() * 30) % 360;
    enemies.push({
      x, y, size,
      speed,
      hp: 1 + Math.floor(wave / 3),
      maxHp: 1 + Math.floor(wave / 3),
      hue,
      wobble: Math.random() * Math.PI * 2,
    });
  }

  // ────────────────────────────────────────────────────────
  // Shoot at nearest enemy
  // ────────────────────────────────────────────────────────
  function shoot(dt) {
    player.shotCooldown -= dt;
    if (player.shotCooldown > 0 || enemies.length === 0) return;

    // Find nearest enemy
    let nearest = null, minDist = Infinity;
    for (const e of enemies) {
      const dx = e.x - player.x, dy = e.y - player.y;
      const d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; nearest = e; }
    }
    if (!nearest) return;

    const dx = nearest.x - player.x, dy = nearest.y - player.y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const speed = 14;

    bullets.push({
      x: player.x, y: player.y,
      vx: (dx / len) * speed,
      vy: (dy / len) * speed,
      r: 5,
      damage: 1,
      life: 1,
    });
    player.shotCooldown = player.shotRate;
  }

  // ────────────────────────────────────────────────────────
  // Particles
  // ────────────────────────────────────────────────────────
  function spawnParticles(x, y, count, hue) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 2 + Math.random() * 4,
        hue,
        life: 1,
        decay: 0.02 + Math.random() * 0.04,
      });
    }
  }

  function spawnFloatText(x, y, text, color) {
    floatTexts.push({ x, y, text, color, life: 1, vy: -1.2 });
  }

  // ────────────────────────────────────────────────────────
  // Update
  // ────────────────────────────────────────────────────────
  function update(dt) {
    // ── Player movement (lerp toward mouse) ──────────────
    const speed = 7;
    const dx = mouse.x - player.x, dy = mouse.y - player.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > speed) {
      player.x += (dx / d) * speed;
      player.y += (dy / d) * speed;
    } else {
      player.x = mouse.x;
      player.y = mouse.y;
    }
    // Keep player on canvas
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    // Trail
    player.trail.push({ x: player.x, y: player.y, life: 1 });
    if (player.trail.length > 20) player.trail.shift();
    player.trail.forEach(t => t.life -= 0.05);

    // ── Invincibility timer ───────────────────────────────
    if (player.invincible > 0) player.invincible -= dt;

    // ── Spawn enemies ─────────────────────────────────────
    spawnTimer += dt;
    const effectiveInterval = Math.max(80, spawnInterval - wave * 18);
    while (spawnTimer >= effectiveInterval) {
      spawnEnemy();
      spawnTimer -= effectiveInterval;
    }

    // Occasionally spawn burst
    const burstChance = 0.001 * wave;
    if (Math.random() < burstChance) {
      for (let i = 0; i < 5 + wave; i++) spawnEnemy();
    }

    // ── Wave progression ──────────────────────────────────
    waveTimer += dt;
    if (waveTimer > 12000) {
      wave++;
      waveTimer = 0;
      waveDisplay.textContent = wave;
      showWaveAnnounce(wave);
    }

    // ── Move enemies toward player ────────────────────────
    for (const e of enemies) {
      const ex = player.x - e.x, ey = player.y - e.y;
      const el = Math.sqrt(ex * ex + ey * ey) || 1;
      e.wobble += 0.05;
      const wobbleX = Math.cos(e.wobble) * 0.3;
      e.x += (ex / el) * e.speed + wobbleX;
      e.y += (ey / el) * e.speed;
    }

    // ── Auto-shoot ────────────────────────────────────────
    shoot(dt);

    // ── Move bullets ─────────────────────────────────────
    for (const b of bullets) {
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) b.life = 0;
    }

    // ── Bullet ↔ Enemy collision ──────────────────────────
    for (const b of bullets) {
      if (b.life <= 0) continue;
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        const bex = b.x - e.x, bey = b.y - e.y;
        if (Math.abs(bex) < e.size + b.r && Math.abs(bey) < e.size + b.r) {
          e.hp -= b.damage;
          b.life = 0;
          spawnParticles(b.x, b.y, 6, e.hue);
          if (e.hp <= 0) {
            spawnParticles(e.x, e.y, 18, e.hue);
            const pts = 10 * wave;
            spawnFloatText(e.x, e.y, `+${pts}`, '#00e5ff');
            score += pts;
            kills++;
            scoreDisplay.textContent = score;
            killDisplay.textContent  = kills;
          }
          break;
        }
      }
    }

    // ── Enemy ↔ Player collision ──────────────────────────
    if (player.invincible <= 0) {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        const dx2 = e.x - player.x, dy2 = e.y - player.y;
        const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        if (dist < player.r + e.size * 0.9) {
          player.hp -= 8;
          player.invincible = 500;
          spawnParticles(player.x, player.y, 10, 0);
          e.hp = 0; // destroy enemy on contact
          const pct = Math.max(0, player.hp / player.maxHp * 100);
          healthFill.style.width = pct + '%';
          if (pct < 30) {
            healthFill.style.background = 'linear-gradient(90deg, #ff4444, #ff8800)';
            healthFill.style.boxShadow = '0 0 8px rgba(255,68,68,0.8)';
          } else {
            healthFill.style.background = 'linear-gradient(90deg, #00ff88, #00e5ff)';
            healthFill.style.boxShadow = '0 0 8px rgba(0,255,136,0.6)';
          }
          if (player.hp <= 0) {
            state = 'dead';
            showGameOver();
            return;
          }
        }
      }
    }

    // ── Cleanup ───────────────────────────────────────────
    for (let i = enemies.length - 1; i >= 0; i--)
      if (enemies[i].hp <= 0) enemies.splice(i, 1);
    for (let i = bullets.length - 1; i >= 0; i--)
      if (bullets[i].life <= 0) bullets.splice(i, 1);

    // Particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
    }
    for (let i = particles.length - 1; i >= 0; i--)
      if (particles[i].life <= 0) particles.splice(i, 1);

    // Float texts
    for (const t of floatTexts) { t.y += t.vy; t.life -= 0.018; }
    for (let i = floatTexts.length - 1; i >= 0; i--)
      if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
  }

  // ────────────────────────────────────────────────────────
  // Draw
  // ────────────────────────────────────────────────────────
  function draw() {
    // Background
    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.045)';
    ctx.lineWidth = 1;
    const grid = 50;
    for (let x = 0; x < W; x += grid) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += grid) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = p.life * 0.9;
      ctx.fillStyle = `hsl(${p.hue}, 100%, 65%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Enemies
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      const s = e.size;
      // Shadow glow
      ctx.shadowColor = `hsl(${e.hue}, 100%, 55%)`;
      ctx.shadowBlur  = 14;
      ctx.fillStyle   = `hsl(${e.hue}, 90%, 40%)`;
      ctx.fillRect(e.x - s, e.y - s, s * 2, s * 2);
      // Inner highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle  = `hsl(${e.hue}, 100%, 65%)`;
      ctx.fillRect(e.x - s + 3, e.y - s + 3, s - 3, s - 3);

      // HP bar
      if (e.maxHp > 1) {
        const barW = s * 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(e.x - s, e.y - s - 8, barW, 4);
        ctx.fillStyle = `hsl(${e.hue}, 100%, 55%)`;
        ctx.fillRect(e.x - s, e.y - s - 8, barW * (e.hp / e.maxHp), 4);
      }
    }
    ctx.shadowBlur = 0;

    // Player trail
    for (let i = 0; i < player.trail.length; i++) {
      const t = player.trail[i];
      const a = (i / player.trail.length) * t.life * 0.35;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, player.r * (i / player.trail.length) * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Bullets
    for (const b of bullets) {
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur  = 12;
      ctx.fillStyle   = '#ffffff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      // Bullet trail
      ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, b.r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Player
    const blinking = player.invincible > 0 && Math.floor(player.invincible / 80) % 2 === 0;
    if (!blinking) {
      // Outer glow ring
      ctx.shadowColor = '#00e5ff';
      ctx.shadowBlur  = 28;
      ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI * 2);
      ctx.stroke();

      // Main body
      const grad = ctx.createRadialGradient(player.x - 5, player.y - 5, 2, player.x, player.y, player.r);
      grad.addColorStop(0, '#80ffff');
      grad.addColorStop(0.5, '#00b4d8');
      grad.addColorStop(1, '#0077b6');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
      ctx.fill();

      // Crosshair dot
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Float texts
    for (const t of floatTexts) {
      ctx.globalAlpha = t.life;
      ctx.fillStyle   = t.color;
      ctx.font        = `bold 14px Orbitron, monospace`;
      ctx.textAlign   = 'center';
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    // Cursor crosshair
    drawCrosshair(mouse.x, mouse.y);
  }

  function drawCrosshair(x, y) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur  = 6;
    const r = 10, gap = 4;
    ctx.beginPath();
    ctx.moveTo(x - r - gap, y); ctx.lineTo(x - gap, y);
    ctx.moveTo(x + gap, y);     ctx.lineTo(x + r + gap, y);
    ctx.moveTo(x, y - r - gap); ctx.lineTo(x, y - gap);
    ctx.moveTo(x, y + gap);     ctx.lineTo(x, y + r + gap);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ────────────────────────────────────────────────────────
  // Main loop
  // ────────────────────────────────────────────────────────
  function loop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;
    if (state === 'playing') {
      update(dt);
      draw();
      rafId = requestAnimationFrame(loop);
    }
  }

  // ────────────────────────────────────────────────────────
  // Game over
  // ────────────────────────────────────────────────────────
  function showGameOver() {
    // Death burst
    for (let i = 0; i < 60; i++) spawnParticles(player.x, player.y, 1, Math.random() * 360);
    draw(); // draw the burst

    setTimeout(() => {
      finalScore.textContent = score.toLocaleString();
      finalStats.textContent = `Wave ${wave} 도달 · ${kills}킬 달성`;
      gameOverScreen.classList.remove('hidden');
    }, 600);
  }

  // ────────────────────────────────────────────────────────
  // Initial idle draw
  // ────────────────────────────────────────────────────────
  (function idleDraw() {
    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.045)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  })();
})();
</script>
</body>
</html>
